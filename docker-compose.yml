services:
  db:
    image: postgres:15-alpine
    container_name: kleinanzeigen_db
    restart: always
    environment:
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_password
      POSTGRES_DB: kleinanzeigen_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/00-init-db.sql
      - ./schema.sql:/docker-entrypoint-initdb.d/10-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker_user -d kleinanzeigen_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.49.3
    container_name: kleinanzeigen_metabase
    restart: always
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: tracker_user
      MB_DB_PASS: tracker_password
      MB_DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
